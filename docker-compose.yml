services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=file:/data/dev.db
      - NODE_ENV=production
    # Playwright/Chromium needs shared memory in Docker
    shm_size: "1gb"
    volumes:
      - app-data:/data
      - app-reports:/app/reports

volumes:
  app-data:
  app-reports:
